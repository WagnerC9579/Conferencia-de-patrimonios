<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário patrimonial</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>
    <main class="container">
        <h1>Inventário patrimonial</h1>

        <section class="box">
            <h2>Localização da conferência</h2>

            <label for="selectSessao">1. Selecione sua lotação</label>
            <select id="selectSessao">
                <option value="" disabled selected>Escolha a lotação...</option>
            </select>

            <div id="blocoLocalColeta">
                <label for="selectLocal">2. Selecione o local de coleta</label>
                <select id="selectLocal">
                    <option value="" disabled selected>Escolha o local...</option>
                </select>
            </div>
        </section>

        <section class="box">
            <h2>Conferência</h2>

            <label for="campoUsuario">Responsável</label>
            <input type="text" id="campoUsuario" placeholder="Digite seu nome" autocomplete="name">

            <label for="campopatrimonio">Patrimônio</label>
            <input type="text" id="campopatrimonio" placeholder="Digite ou escaneie o patrimônio" inputmode="numeric">

            <p id="mensagem" class="mensagem"></p>

            <button id="btnConferir" type="button">Conferir manual</button>

            <div class="scanner-acoes">
                <button id="btnAbrirScanner" type="button">Iniciar leitura</button>
                <button id="btnPararScanner" type="button" class="perigo">Parar leitura</button>
            </div>

            <div id="reader"></div>
            <p id="statusLeitura" class="mensagem status-leitura"></p>
        </section>

        <section class="box">
            <details>
                <summary>Contagem sem leitura</summary>

                <div class="linha-form contagem-grid">
                    <label for="tipoItemContagem">
                        Tipo do item
                        <input type="text" id="tipoItemContagem" placeholder="Ex: Câmera, access point, TV">
                    </label>

                    <label for="quantidadeContagem">
                        Quantidade
                        <input type="number" id="quantidadeContagem" min="1" step="1" placeholder="Ex: 6">
                    </label>
                </div>

                <label for="observacaoContagem">
                    Observação
                    <input type="text" id="observacaoContagem" placeholder="Ex: Item em altura, sem acesso à etiqueta">
                </label>

                <button id="btnRegistrarContagem" type="button">Registrar contagem</button>
                <p id="mensagemContagem" class="mensagem"></p>
            </details>
        </section>

        <section class="box">
            <h2 id="tituloResumo">Resumo da unidade</h2>
            <div class="resumo">
                <p id="total">Total: 0</p>
                <p id="pendentestotal">Pendentes: 0</p>
                <p id="conferidostotal">Conferidos: 0</p>
            </div>

            <details open>
                <summary>Pendentes</summary>
                <ul id="listapatrimonios"></ul>
            </details>

            <details>
                <summary>Conferidos</summary>
                <ul id="listaconferidos"></ul>
            </details>

            <div class="grafico-container">
                <canvas id="graficopatrimonio"></canvas>
            </div>
        </section>

        <section id="relatoriosOperador" class="box area-relatorios relatorio-operador">
            <h2>Relatórios</h2>

            <div class="linha-form relatorio-grid-operador">
                <label for="tipoRelatorioOperador">
                    Tipo de relatório
                    <select id="tipoRelatorioOperador">
                        <option value="pendentes">Pendentes</option>
                        <option value="conferidos">Conferidos</option>
                        <option value="todos">Todos</option>
                        <option value="transferencias">Itens a transferir</option>
                        <option value="naoCadastrados">Não consta na base</option>
                        <option value="contagens">Contagem sem leitura</option>
                    </select>
                </label>

                <label for="abrangenciaRelatorioOperador">
                    Abrangência
                    <select id="abrangenciaRelatorioOperador">
                        <option value="local">Apenas este local</option>
                        <option value="lotacao">Toda a lotação</option>
                    </select>
                </label>
            </div>

            <button id="btnExportarRelatorioOperador" type="button">Exportar Excel</button>
            <p id="mensagemRelatorioOperador" class="mensagem"></p>
        </section>
    </main>

    <script src="script.js?v=20260612-1015"></script>
</body>
</html>
