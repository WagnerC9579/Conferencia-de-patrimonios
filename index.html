<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário patrimonial</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>
    <main class="container tela-operador">
        <header class="topo-operador">
            <h1>Inventário patrimonial</h1>
            <span class="status-desktop">Acompanhamento em tempo real</span>
        </header>

        <section class="localizacao-operador" aria-label="Localização da conferência">
            <h2>Localização</h2>
            <div class="localizacao-grid">
                <label for="selectSessao">Lotação
                    <select id="selectSessao">
                        <option value="" disabled selected>Escolha a lotação...</option>
                    </select>
                </label>

                <div id="blocoLocalColeta">
                    <label for="selectLocal">Local de coleta
                        <select id="selectLocal">
                            <option value="" disabled selected>Escolha o local...</option>
                        </select>
                    </label>
                </div>

                <label for="campoUsuario" class="campo-responsavel">Responsável
                    <input type="text" id="campoUsuario" placeholder="Digite seu nome" autocomplete="name">
                </label>
            </div>
        </section>

        <section class="andamento-desktop" aria-label="Andamento da conferência">
            <h2>Andamento</h2>
            <div class="andamento-linhas">
                <div class="linha-andamento local">
                    <div id="nomeLocalAndamento" class="nome-linha">Local</div>
                    <div class="dado"><strong id="total">0</strong><span>Total</span></div>
                    <div class="dado"><strong id="conferidostotal">0</strong><span>Conferidos</span></div>
                    <div class="dado"><strong id="pendentestotal">0</strong><span>Pendentes</span></div>
                    <div class="dado"><strong id="percentualLocal">0%</strong><span>Local</span><div class="barra-progresso"><div id="barraLocal"></div></div></div>
                </div>
                <div class="linha-andamento">
                    <div id="nomeLotacaoAndamento" class="nome-linha">Lotação</div>
                    <div class="dado"><strong id="lotacaoTotal">0</strong><span>Total</span></div>
                    <div class="dado"><strong id="lotacaoConferidos">0</strong><span>Conferidos</span></div>
                    <div class="dado"><strong id="lotacaoPendentes">0</strong><span>Pendentes</span></div>
                    <div class="dado"><strong id="percentualLotacao">0%</strong><span>Lotação</span><div class="barra-progresso"><div id="barraLotacao"></div></div></div>
                </div>
            </div>
        </section>

        <section class="box conferencia-operador">
            <h2>Leitura</h2>

            <div class="scanner-mobile">
                <button id="btnAbrirScanner" type="button">Iniciar leitura</button>

                <div id="scannerArea" class="scanner-area">
                    <button id="btnPararScanner" type="button" class="fechar-camera" aria-label="Fechar câmera">×</button>
                    <div id="reader"></div>
                </div>

                <p id="statusLeitura" class="mensagem status-leitura"></p>
            </div>

            <details id="conferenciaManual" class="conferencia-manual">
                <summary>Digitar manualmente</summary>

                <label for="campopatrimonio">Patrimônio</label>
                <input type="text" id="campopatrimonio" placeholder="Digite o patrimônio" inputmode="numeric">

                <button id="btnConferir" type="button">Conferir</button>
            </details>

            <p id="mensagem" class="mensagem"></p>
        </section>

        <section class="box contagem-operador">
            <details>
                <summary>Contagem sem leitura</summary>

                <div class="linha-form contagem-grid">
                    <label for="tipoItemContagem">
                        Tipo do item
                        <input type="text" id="tipoItemContagem" placeholder="Ex: Câmera, access point, TV">
                    </label>

                    <label for="quantidadeContagem">
                        Quantidade
                        <input type="number" id="quantidadeContagem" min="1" step="1" placeholder="Ex: 6">
                    </label>
                </div>

                <label for="observacaoContagem">
                    Observação
                    <input type="text" id="observacaoContagem" placeholder="Ex: Item em altura, sem acesso à etiqueta">
                </label>

                <button id="btnRegistrarContagem" type="button">Registrar contagem</button>
                <p id="mensagemContagem" class="mensagem"></p>
            </details>
        </section>

        <section class="painel-principal-operador">
            <div class="box grafico-desktop">
                <h2 id="tituloResumo">Progresso do local</h2>
                <div class="grafico-container">
                    <canvas id="graficopatrimonio"></canvas>
                </div>
            </div>

            <div class="listas-operador">
                <details open>
                    <summary id="summaryPendentes">Pendentes</summary>
                    <ul id="listapatrimonios"></ul>
                </details>

                <details>
                    <summary id="summaryConferidos">Conferidos</summary>
                    <ul id="listaconferidos"></ul>
                </details>
            </div>
        </section>

        <section class="rodape-operador"><details id="relatoriosOperador" class="area-relatorios relatorio-operador">
                <summary>Relatórios</summary>
                <div class="corpo-recolhido">
                    <input type="hidden" id="tipoRelatorioOperador" value="todos">

                    <label for="abrangenciaRelatorioOperador">
                        Abrangência
                        <select id="abrangenciaRelatorioOperador">
                            <option value="local">Apenas este local</option>
                            <option value="lotacao">Toda a lotação</option>
                        </select>
                    </label>

                    <button id="btnExportarRelatorioOperador" type="button">Gerar relatório geral</button>
                    <p id="mensagemRelatorioOperador" class="mensagem"></p>
                </div>
            </details>
        </section>
    </main>

    <script src="script.js?v=20260619-2305"></script>
</body>
</html>
